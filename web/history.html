<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>History — Solar Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="background"></canvas>

    <header class="topbar">
        <div class="topbar__left">
            <h1>Solar Dashboard</h1>
            <nav class="nav">
                <a href="/" class="nav__link">Dashboard</a>
                <a href="/devices" class="nav__link">Devices</a>
                <a href="/settings" class="nav__link">Settings</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="panel">
            <div class="devices-head">
                <h2 class="panel__title" id="history-title">History</h2>
                <a href="/" class="btn">← Back</a>
            </div>

            <div class="controls">
                <label class="field">
                    <span class="field__label">Time unit</span>
                    <select id="unit" class="field__input">
                        <option value="months">Months</option>
                        <option value="weeks">Weeks</option>
                        <option value="days">Days</option>
                        <option value="hours">Hours</option>
                        <option value="minutes">Minutes</option>
                    </select>
                </label>
                <label class="field">
                    <span class="field__label">Start date</span>
                    <input type="date" id="start-date" class="field__input">
                </label>
                <label class="field">
                    <span class="field__label">Start time</span>
                    <input type="time" id="start-time" class="field__input">
                </label>
                <label class="field">
                    <span class="field__label">End date</span>
                    <input type="date" id="end-date" class="field__input">
                </label>
                <label class="field">
                    <span class="field__label">End time</span>
                    <input type="time" id="end-time" class="field__input">
                </label>
            </div>

            <div id="charts"></div>
        </section>
    </main>

    <script src="background.js"></script>
    <script src="history.js"></script>
</body>
</html>
