<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>History — Solar Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="background"></canvas>

    <header class="topbar">
        <div class="topbar__left">
            <h1>Solar Dashboard</h1>
            <nav class="nav">
                <a href="/" class="nav__link">Dashboard</a>
                <a href="/devices" class="nav__link">Devices</a>
                <a href="/settings" class="nav__link">Settings</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="panel">
            <div class="devices-head">
                <h2 class="panel__title" id="history-title">History</h2>
                <a href="/" class="btn">← Back</a>
            </div>
            <div class="chart-wrap">
                <canvas id="chart"></canvas>
                <p id="chart-empty" class="empty" hidden>No history recorded yet for this device.</p>
            </div>
        </section>
    </main>

    <script src="background.js"></script>
    <script src="history.js"></script>
</body>
</html>
