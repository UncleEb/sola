<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Devices — Sola</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="background"></canvas>

    <header class="topbar">
        <div class="topbar__left">
            <a class="brand" href="/" aria-label="Sola home"><img class="brand__logo" src="/assets/logo.svg" alt="Sola"></a>
            <nav class="nav">
                <a href="/" class="nav__link">Dashboard</a>
                <details class="nav__dropdown">
                    <summary class="nav__link nav__dropdown-toggle nav__link--active">Settings</summary>
                    <div class="nav__dropdown-menu">
                        <a href="/settings" class="nav__link">Settings</a>
                        <a href="/devices" class="nav__link nav__link--active">Devices</a>
                    </div>
                </details>
            </nav>
        </div>
    </header>

    <main>
        <section class="panel">
            <div class="devices-head">
                <h2 class="panel__title">Registered Devices</h2>
                <a href="/device" class="btn btn--primary">Add Device</a>
            </div>
            <div id="devices" class="device-list">
                <p class="empty">Loading…</p>
            </div>
        </section>
    </main>

    <script src="background.js"></script>
    <script src="devices.js"></script>
</body>
</html>
