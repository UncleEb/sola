<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sola</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Decorative, configurable background (starfield / warpspeed / none). -->
    <canvas id="background"></canvas>

    <header class="topbar">
        <div class="topbar__left">
            <a class="brand" href="/" aria-label="Sola home"><img class="brand__logo" src="/assets/logo.svg" alt="Sola"></a>
            <nav class="nav">
                <a href="/" class="nav__link nav__link--active">Dashboard</a>
                <a href="/devices" class="nav__link">Devices</a>
                <a href="/settings" class="nav__link">Settings</a>
            </nav>
        </div>
        <div id="connection" class="pill pill--unknown">
            <span class="pill__dot"></span>
            <span id="connection-text">Connecting…</span>
        </div>
    </header>

    <main>
        <!-- Solar charger: PV in, battery out. The power-flow animation sits in
             its own block below the title, above the reading columns. -->
        <section class="panel" id="charger-panel">
            <h2 class="panel__title">Solar Charger</h2>
            <div id="charger-flow" class="charger-flow"></div>
            <div id="charger" class="charger charger--empty">
                <p class="empty">No charge controller registered.</p>
            </div>
        </section>

        <!-- Battery pool aggregate: the single source of truth for SOC -->
        <section class="panel" id="aggregate-panel">
            <h2 class="panel__title">Battery Pool</h2>
            <div id="aggregate" class="aggregate">
                <p class="empty">Waiting for data…</p>
            </div>
        </section>

        <!-- Individual banks -->
        <section class="panel" id="banks-panel">
            <h2 class="panel__title">Battery Banks</h2>
            <div id="banks" class="banks">
                <p class="empty">Waiting for data…</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <span id="last-update">—</span>
    </footer>

    <script src="background.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
