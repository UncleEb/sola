<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings — Sola</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="background"></canvas>

    <header class="topbar">
        <div class="topbar__left">
            <a class="brand" href="/" aria-label="Sola home"><img class="brand__logo" src="/assets/logo.svg" alt="Sola"></a>
            <nav class="nav">
                <a href="/" class="nav__link">Dashboard</a>
                <details class="nav__dropdown">
                    <summary class="nav__link nav__dropdown-toggle nav__link--active">Settings</summary>
                    <div class="nav__dropdown-menu">
                        <a href="/settings" class="nav__link nav__link--active">Settings</a>
                        <a href="/devices" class="nav__link">Devices</a>
                    </div>
                </details>
            </nav>
        </div>
    </header>

    <main>
        <section class="panel">
            <h2 class="panel__title">Settings</h2>

            <form class="form" id="settings-form">
                <label class="field">
                    <span class="field__label">Background</span>
                    <select id="background-select" class="field__input">
                        <option value="none">None (plain black)</option>
                        <option value="starfield">Starfield</option>
                        <option value="warpspeed">Warpspeed</option>
                    </select>
                    <span class="field__hint">Applies to every page; saved immediately.</span>
                </label>

                <div id="settings-status" class="field__hint" aria-live="polite"></div>
            </form>
        </section>
    </main>

    <script src="background.js"></script>
    <script src="settings.js"></script>
</body>
</html>
